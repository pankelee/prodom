<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PROdom Admin</title>
  <style>
    :root {
      --bg: #f3f7fb;
      --panel: #ffffff;
      --ink: #0f274b;
      --muted: #4d6285;
      --line: #d7e2f0;
      --brand: #2f67b5;
      --brand-soft: #e8f1ff;
      --danger: #c43d3d;
      --ok: #2d8755;
      --radius: 14px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Inter", "Segoe UI", Tahoma, sans-serif;
      background: linear-gradient(180deg, #f8fbff 0%, var(--bg) 100%);
      color: var(--ink);
    }

    .wrap {
      width: min(1180px, 94vw);
      margin: 24px auto 40px;
    }

    .topbar {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 16px 18px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 18px;
    }

    .title {
      margin: 0;
      font-size: 24px;
      line-height: 1.15;
    }

    .subtitle {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .layout {
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 18px;
      align-items: start;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 16px;
    }

    .panel h2 {
      margin: 0 0 14px;
      font-size: 18px;
    }

    .field {
      display: grid;
      gap: 6px;
      margin-bottom: 12px;
    }

    label {
      color: var(--muted);
      font-size: 13px;
      font-weight: 600;
    }

    input,
    textarea,
    select,
    button {
      font: inherit;
    }

    input,
    textarea,
    select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px 11px;
      background: #fff;
    }

    textarea {
      min-height: 88px;
      resize: vertical;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
    }

    .btn {
      border: 1px solid transparent;
      border-radius: 10px;
      padding: 10px 12px;
      cursor: pointer;
      font-weight: 600;
      background: #fff;
      color: var(--ink);
    }

    .btn-brand {
      background: var(--brand);
      color: #fff;
    }

    .btn-soft {
      background: var(--brand-soft);
      border-color: #bfd6f7;
      color: #154b95;
    }

    .btn-danger {
      background: #fff1f1;
      border-color: #efc7c7;
      color: var(--danger);
    }

    .btn-ghost {
      border-color: var(--line);
      color: var(--muted);
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .category-list {
      list-style: none;
      padding: 0;
      margin: 12px 0 0;
      display: grid;
      gap: 7px;
    }

    .category-item {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 8px 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      background: #fcfdff;
    }

    .muted {
      color: var(--muted);
      font-size: 13px;
    }

    .status {
      margin-top: 10px;
      font-size: 13px;
      padding: 8px 10px;
      border-radius: 8px;
      display: none;
    }

    .status.show {
      display: block;
    }

    .status.ok {
      background: #e9f8ef;
      color: var(--ok);
      border: 1px solid #bde7ca;
    }

    .status.warn {
      background: #fff8e9;
      color: #9b6b0d;
      border: 1px solid #f3e2b8;
    }

    .products-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .products-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(220px, 1fr));
      gap: 12px;
    }

    .card {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px;
      background: #fff;
      display: grid;
      gap: 8px;
    }

    .thumb {
      width: 100%;
      height: 160px;
      object-fit: cover;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: #f0f4fa;
    }

    .meta h3 {
      margin: 0;
      font-size: 16px;
    }

    .meta p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .meta .price {
      color: var(--ink);
      font-weight: 700;
      margin-top: 5px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      padding: 3px 8px;
      border-radius: 999px;
      background: var(--brand-soft);
      color: #2157a7;
      border: 1px solid #bfd6f7;
      font-size: 12px;
      font-weight: 600;
    }

    .card-actions {
      display: flex;
      gap: 8px;
    }

    .preview {
      width: 100%;
      height: 150px;
      border: 1px dashed #b4c7e3;
      border-radius: 10px;
      object-fit: contain;
      background: #f6f9ff;
    }

    .empty {
      border: 1px dashed #b9cbe7;
      border-radius: 10px;
      padding: 14px;
      text-align: center;
      color: var(--muted);
      font-size: 14px;
    }

    .orders-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }

    .orders-list {
      display: grid;
      gap: 10px;
    }

    .order-card {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px;
      background: #fff;
      display: grid;
      gap: 8px;
    }

    .order-card-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .order-card-title {
      margin: 0;
      font-size: 15px;
    }

    .order-card-meta {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      display: grid;
      gap: 3px;
    }

    .order-items {
      margin: 0;
      padding-left: 18px;
      color: var(--muted);
      font-size: 13px;
      display: grid;
      gap: 4px;
    }

    .feedback-list {
      display: grid;
      gap: 8px;
      margin-top: 10px;
    }

    .feedback-item {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px;
      background: #fff;
      display: grid;
      gap: 4px;
    }

    .feedback-item p {
      margin: 0;
      font-size: 13px;
      color: var(--muted);
    }

    @media (max-width: 980px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .products-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="topbar">
      <div>
        <h1 class="title">Админ-панель PROdom</h1>
        <p class="subtitle">Управление категориями фильтров и карточками товаров. Не подключено к основному сайту.</p>
      </div>
      <button id="reset-all" class="btn btn-danger" type="button">Сбросить все данные</button>
    </section>

    <main class="layout">
      <section class="panel">
        <h2>Категории фильтра</h2>
        <div class="field">
          <label for="category-limit">Количество категорий</label>
          <input id="category-limit" type="number" min="1" max="50" value="5">
        </div>

        <div class="field">
          <label for="new-category">Добавить категорию</label>
          <div class="row">
            <input id="new-category" type="text" placeholder="Например, Сантехника">
            <button id="add-category" class="btn btn-soft" type="button">Добавить</button>
          </div>
        </div>

        <p id="category-counter" class="muted">0 / 0</p>
        <ul id="category-list" class="category-list"></ul>

        <div id="category-status" class="status"></div>
      </section>

      <section class="panel">
        <div class="orders-head">
          <h2 style="margin:0;">Обратная связь</h2>
          <button id="clear-feedback" class="btn btn-danger" type="button">Очистить</button>
        </div>
        <p id="feedback-count" class="muted">0</p>
        <div id="feedback-list" class="feedback-list"></div>
      </section>

      <section class="panel">
        <h2>Site and order settings</h2>
        <div class="field">
          <label for="setting-brand-name">Brand name</label>
          <input id="setting-brand-name" type="text" placeholder="PROdom">
        </div>
        <div class="field">
          <label for="setting-support-phone">Support phone</label>
          <input id="setting-support-phone" type="text" placeholder="+7 (000) 000-00-00">
        </div>
        <div class="field">
          <label for="setting-support-email">Support email</label>
          <input id="setting-support-email" type="email" placeholder="info@prodom.ru">
        </div>
        <div class="field">
          <label for="setting-hero-title">Hero title</label>
          <input id="setting-hero-title" type="text">
        </div>
        <div class="field">
          <label for="setting-hero-subtitle">Hero subtitle</label>
          <textarea id="setting-hero-subtitle"></textarea>
        </div>
        <div class="field">
          <label for="setting-newsletter-title">Newsletter title</label>
          <input id="setting-newsletter-title" type="text">
        </div>
        <div class="field">
          <label for="setting-newsletter-note">Footer note</label>
          <textarea id="setting-newsletter-note"></textarea>
        </div>
        <div class="field">
          <label for="setting-order-statuses">Order statuses (one per line)</label>
          <textarea id="setting-order-statuses" placeholder="New&#10;Confirmed&#10;In delivery&#10;Completed"></textarea>
        </div>
        <div class="field">
          <label for="setting-default-order-status">Default order status</label>
          <select id="setting-default-order-status"></select>
        </div>
        <div class="field">
          <label for="setting-payment-methods">Payment methods (one per line)</label>
          <textarea id="setting-payment-methods" placeholder="Card online&#10;Cash on delivery"></textarea>
        </div>
        <div class="field">
          <label for="setting-delivery-methods">Delivery methods (one per line)</label>
          <textarea id="setting-delivery-methods" placeholder="Delivery&#10;Pickup"></textarea>
        </div>
        <div class="field">
          <label for="setting-contact-topics">Contact topics (one per line)</label>
          <textarea id="setting-contact-topics" placeholder="Product question&#10;Delivery&#10;Partnership&#10;Other"></textarea>
        </div>
        <div class="field">
          <label for="setting-catalog-page-size">Catalogue page-size options (comma separated)</label>
          <input id="setting-catalog-page-size" type="text" placeholder="8,12,16,24">
        </div>
        <button id="save-settings" class="btn btn-brand" type="button">Save settings</button>
        <div id="settings-status" class="status"></div>
      </section>

      <section class="panel">
        <div class="products-head">
          <h2>Карточки товаров</h2>
          <div style="display:flex; align-items:center; gap:8px; flex-wrap:wrap;">
            <input id="import-data-file" type="file" accept=".json,application/json" style="display:none;">
            <button id="import-data" class="btn btn-soft" type="button">Импорт JSON</button>
            <button id="export-data" class="btn btn-ghost" type="button">Экспорт JSON</button>
          </div>
        </div>

        <form id="product-form" novalidate>
          <input id="product-id" type="hidden">

          <div class="field">
            <label for="product-name">Название товара</label>
            <input id="product-name" type="text" required placeholder="Например, Смеситель">
          </div>

          <div class="field">
            <label for="product-category">Категория</label>
            <select id="product-category" required></select>
          </div>

          <div class="field">
            <label for="product-price">Цена (₽)</label>
            <input id="product-price" type="number" min="0" step="1" required placeholder="2490">
          </div>

          <div class="field">
            <label for="product-description">Описание</label>
            <textarea id="product-description" placeholder="Короткое описание товара"></textarea>
          </div>

          <div class="field">
            <label for="product-photo">Фотография</label>
            <input id="product-photo" type="file" accept="image/*">
          </div>

          <img id="photo-preview" class="preview" alt="Предпросмотр фото">

          <div class="row" style="margin-top:12px;">
            <button id="save-product" class="btn btn-brand" type="submit">Сохранить товар</button>
            <button id="cancel-edit" class="btn btn-ghost" type="button">Очистить форму</button>
          </div>
        </form>

        <div id="product-status" class="status"></div>

        <div style="margin-top:18px;">
          <h2 style="margin-bottom:10px;">Список товаров</h2>
          <div id="products-grid" class="products-grid"></div>
        </div>
      </section>

      <section class="panel" style="grid-column: 1 / -1;">
        <div class="orders-head">
          <h2 style="margin:0;">Заказы</h2>
          <div style="display:flex; align-items:center; gap:10px;">
            <span id="orders-count" class="muted">0</span>
            <button id="clear-orders" class="btn btn-danger" type="button">Очистить заказы</button>
          </div>
        </div>
        <div id="orders-list" class="orders-list"></div>
      </section>
    </main>
  </div>

  <script src="./admin.js"></script>
</body>
</html>
