<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Корзина — PROdom</title>
<link rel="stylesheet" href="/style.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>

<body>

<header class="header">
    <div class="container header-container">

        <a href="../index.html" class="logo-wrapper">
            <img src="../images/logo.svg" class="logo-img" alt="PROdom">
            <span class="logo-text">PROdom</span>
        </a>

        <nav class="nav">
            <a href="about.html">О нас</a>
            <a href="../index.html">Главная</a>
            <a href="catalogue.html">Каталог</a>
            <a href="contacts.html">Контакты</a>
            <a href="../admin/admin.html" class="admin-nav-link">Админ</a>
        </nav>

        <div class="header-actions">
            <input type="text" placeholder="Поиск..." class="input">
            <a href="favourites.html">
                <img src="../images/like.svg" alt="Избранное">
                <span class="fav-count">0</span>
            </a>
            <a href="cart.html">
                <img src="../images/cart.svg" alt="Корзина">
                <span class="cart-count">0</span>
            </a>
        </div>

    </div>
</header>

<main class="container">
    <section class="cart-page">
        <h1 class="section-title cart-title">Корзина</h1>
        <p class="cart-subtitle">Проверьте товары перед оформлением заказа.</p>

        <div id="cart-empty" class="cart-empty" hidden>
            <p>В корзине пока ничего нет.</p>
            <a class="btn-primary empty-catalogue-link" href="./catalogue.html">Перейти в каталог</a>
        </div>

        <div id="cart-list" class="cart-list"></div>

        <div id="cart-summary" class="cart-summary" hidden>
            <div class="cart-summary-total">
                <span>Итого:</span>
                <strong id="cart-total">0 ₽</strong>
            </div>
            <a id="checkout-btn" class="btn-primary cart-checkout-btn" href="./order.html">Оформить заказ</a>
        </div>
    </section>
</main>

<footer class="footer">
    <div class="container">

        <div class="newsletter">
            <div>
                <h3>Готовы узнавать о новинках?</h3>
                <input type="email" placeholder="Ваш Email" class="input">
                <button class="btn-primary">Отправить</button>
            </div>

            <div>
                <h4>Товары для дома</h4>
                <p>Мы создаём комфорт и уют вместе с вами.</p>
            </div>
        </div>

        <div class="footer-bottom">
            © 2026 PROdom. Все права защищены.
        </div>

    </div>
</footer>

<script src="/script.js"></script>
<script>
(function () {
  const STORAGE_KEY = "cart";
  const listNode = document.getElementById("cart-list");
  const emptyNode = document.getElementById("cart-empty");
  const summaryNode = document.getElementById("cart-summary");
  const totalNode = document.getElementById("cart-total");
  const checkoutBtn = document.getElementById("checkout-btn");

  document.addEventListener("DOMContentLoaded", initCartPage);

  function initCartPage() {
    if (!listNode || !emptyNode || !summaryNode || !totalNode) return;

    render();

    checkoutBtn?.addEventListener("click", (event) => {
      if (checkoutBtn.getAttribute("aria-disabled") === "true") {
        event.preventDefault();
      }
    });

    listNode.addEventListener("click", (event) => {
      const target = event.target;
      if (!(target instanceof HTMLElement)) return;

      const btn = target.closest("button[data-action]");
      if (!btn) return;

      const id = String(btn.dataset.id || "").trim();
      const action = String(btn.dataset.action || "").trim();
      if (!id || !action) return;

      const cart = readCart();
      const itemIndex = cart.findIndex((entry) => String(entry?.id) === id);
      if (itemIndex < 0) return;
      const item = cart[itemIndex];

      if (action === "minus") {
        const nextQty = (Number(item.quantity) || 1) - 1;
        if (nextQty <= 0) {
          cart.splice(itemIndex, 1);
        } else {
          item.quantity = nextQty;
        }
      }

      if (action === "plus") {
        item.quantity = Math.min(99, (Number(item.quantity) || 1) + 1);
      }

      if (action === "remove") {
        cart.splice(itemIndex, 1);
      }

      saveCart(cart);
      render();
    });

  }

  function readCart() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      const parsed = raw ? JSON.parse(raw) : [];
      return Array.isArray(parsed) ? parsed : [];
    } catch {
      return [];
    }
  }

  function saveCart(cart) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(cart));
    if (window.PROdom && typeof window.PROdom.updateCartBadge === "function") {
      window.PROdom.updateCartBadge();
    }
  }

  function formatPrice(value) {
    const number = Number(value) || 0;
    return `${new Intl.NumberFormat("ru-RU").format(number)} ₽`;
  }

  function normalizeImage(src) {
    const value = String(src || "").trim();
    if (!value) return "../images/logo.svg";
    if (value.startsWith("http") || value.startsWith("/")) return value;
    if (value.startsWith("../") || value.startsWith("./")) return value;
    return `../${value}`;
  }

  function render() {
    const cart = readCart();

    listNode.innerHTML = "";

    if (!cart.length) {
      emptyNode.hidden = false;
      summaryNode.hidden = true;
      totalNode.textContent = formatPrice(0);
      if (checkoutBtn) {
        checkoutBtn.setAttribute("aria-disabled", "true");
        checkoutBtn.href = "#";
      }
      return;
    }

    emptyNode.hidden = true;
    summaryNode.hidden = false;
    if (checkoutBtn) {
      checkoutBtn.removeAttribute("aria-disabled");
      checkoutBtn.href = "./order.html";
    }

    const fragment = document.createDocumentFragment();
    let total = 0;

    cart.forEach((item) => {
      const quantity = Math.max(1, Number(item.quantity) || 1);
      const unitPrice = Number(item.price) || 0;
      const itemTotal = unitPrice * quantity;
      total += itemTotal;

      const row = document.createElement("article");
      row.className = "cart-item";

      const image = document.createElement("img");
      image.className = "cart-item-image";
      image.src = normalizeImage(item.image);
      image.alt = String(item.name || "Товар");

      const name = document.createElement("h3");
      name.className = "cart-item-name";
      name.textContent = String(item.name || "Товар");

      const qty = document.createElement("div");
      qty.className = "cart-item-qty";
      qty.innerHTML = `
        <button type="button" class="cart-qty-btn" data-action="minus" data-id="${String(item.id || "")}">-</button>
        <span class="cart-qty-value">${quantity}</span>
        <button type="button" class="cart-qty-btn" data-action="plus" data-id="${String(item.id || "")}">+</button>
      `;

      const line = document.createElement("div");
      line.className = "cart-item-line";

      const unit = document.createElement("p");
      unit.className = "cart-item-unit-price";
      unit.textContent = `Цена: ${formatPrice(unitPrice)}`;

      const sum = document.createElement("p");
      sum.className = "cart-item-total";
      sum.textContent = `Сумма: ${formatPrice(itemTotal)}`;

      const removeBtn = document.createElement("button");
      removeBtn.type = "button";
      removeBtn.className = "cart-remove-btn";
      removeBtn.dataset.action = "remove";
      removeBtn.dataset.id = String(item.id || "");
      removeBtn.textContent = "Удалить";

      const info = document.createElement("div");
      info.className = "cart-item-info";
      info.appendChild(name);
      line.appendChild(unit);
      line.appendChild(qty);
      line.appendChild(sum);
      line.appendChild(removeBtn);
      info.appendChild(line);

      row.appendChild(image);
      row.appendChild(info);
      fragment.appendChild(row);
    });

    listNode.appendChild(fragment);
    totalNode.textContent = formatPrice(total);
  }
})();
</script>
</body>
</html>
