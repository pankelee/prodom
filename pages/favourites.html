<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Избранное — PROdom</title>
<link rel="stylesheet" href="../style.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>

<body>

<header class="header">
    <div class="container header-container">

        <a href="../index.html" class="logo-wrapper">
            <img src="../images/logo.svg" class="logo-img" alt="PROdom">
            <span class="logo-text">PROdom</span>
        </a>

        <nav class="nav">
            <a href="about.html">О нас</a>
            <a href="../index.html">Главная</a>
            <a href="catalogue.html">Каталог</a>
            <a href="contacts.html">Контакты</a>
            <a href="profile.html">Профиль</a>
            <a href="../admin/admin.html" class="admin-nav-link">Админ</a>
        </nav>

        <div class="header-actions">
                        <a href="favourites.html">
                <img src="../images/like.svg" alt="Избранное">
                <span class="fav-count">0</span>
            </a>
            <a href="cart.html">
                <img src="../images/cart.svg" alt="Корзина">
                <span class="cart-count">0</span>
            </a>
        </div>

    </div>
</header>

<main class="container">
    <section class="cart-page">
        <h1 class="section-title cart-title">Избранное</h1>
        <p class="cart-subtitle">Сохраняйте товары, чтобы вернуться к ним позже.</p>

        <div id="favourites-empty" class="cart-empty" hidden>
            <p>В избранном пока ничего нет.</p>
            <a class="btn-primary empty-catalogue-link" href="./catalogue.html">Перейти в каталог</a>
        </div>

        <div id="favourites-list" class="cart-list"></div>
    </section>
</main>

<footer class="footer">
    <div class="container">

        <div class="newsletter">
            <div>
                <h3>Готовы узнавать о новинках?</h3>
                <input type="email" placeholder="Ваш Email" class="input">
                <button class="btn-primary">Отправить</button>
            </div>

            <div>
                <h4>Товары для дома</h4>
                <p>Мы создаём комфорт и уют вместе с вами.</p>
            </div>
        </div>

        <div class="footer-bottom">
            © 2026 PROdom. Все права защищены.
        </div>

    </div>
</footer>

<script src="../script.js"></script>
<script>
(function () {
  const STORAGE_KEY = "favourites";
  const listNode = document.getElementById("favourites-list");
  const emptyNode = document.getElementById("favourites-empty");

  document.addEventListener("DOMContentLoaded", initFavouritesPage);

  function initFavouritesPage() {
    if (!listNode || !emptyNode) return;
    render();

    listNode.addEventListener("click", (event) => {
      const target = event.target;
      if (!(target instanceof HTMLElement)) return;

      const btn = target.closest("button[data-action]");
      if (!btn) return;

      const id = String(btn.dataset.id || "").trim();
      const action = String(btn.dataset.action || "").trim();
      if (!id || !action) return;

      const favourites = readFavourites();
      const itemIndex = favourites.findIndex((entry) => String(entry?.id) === id);
      const item = favourites[itemIndex] || null;

      if (action === "remove" && itemIndex >= 0) {
        favourites.splice(itemIndex, 1);
        saveFavourites(favourites);
        render();
        return;
      }

      if (!item) return;

      if (action === "add") {
        window.PROdom?.addProductToCart?.(item, 1);
        render();
        return;
      }

      if (action === "minus") {
        const current = window.PROdom?.getCartItemQuantity?.(item.id) || 0;
        window.PROdom?.updateCartItemQuantity?.(item, current - 1);
        render();
        return;
      }

      if (action === "plus") {
        const current = window.PROdom?.getCartItemQuantity?.(item.id) || 0;
        window.PROdom?.updateCartItemQuantity?.(item, Math.min(99, current + 1));
        render();
      }
    });

    document.addEventListener("cart:updated", render);
    document.addEventListener("favourites:updated", render);
    window.addEventListener("storage", (event) => {
      if (!event.key || event.key === "cart" || event.key === "favourites") {
        render();
      }
    });
  }

  function readFavourites() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      const parsed = raw ? JSON.parse(raw) : [];
      return Array.isArray(parsed) ? parsed : [];
    } catch {
      return [];
    }
  }

  function saveFavourites(items) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
  }

  function formatPrice(value) {
    const number = Number(value) || 0;
    return `${new Intl.NumberFormat("ru-RU").format(number)} ₽`;
  }

  function normalizeImage(src) {
    const value = String(src || "").trim();
    if (!value) return "../images/logo.svg";
    if (value.startsWith("data:")) return value;
    if (value.startsWith("http")) return value;
    if (value.startsWith("/")) return `..${value}`;
    if (value.startsWith("../") || value.startsWith("./")) return value;
    return `../${value}`;
  }

  function render() {
    const favourites = readFavourites();
    listNode.innerHTML = "";

    if (!favourites.length) {
      emptyNode.hidden = false;
      return;
    }

    emptyNode.hidden = true;

    const fragment = document.createDocumentFragment();

    favourites.forEach((item) => {
      const row = document.createElement("article");
      row.className = "cart-item";

      const image = document.createElement("img");
      image.className = "cart-item-image";
      image.src = normalizeImage(item.image);
      image.alt = String(item.name || "Товар");

      const name = document.createElement("h3");
      name.className = "cart-item-name";
      name.textContent = String(item.name || "Товар");

      const line = document.createElement("div");
      line.className = "cart-item-line";

      const unit = document.createElement("p");
      unit.className = "cart-item-unit-price";
      unit.textContent = `Цена: ${formatPrice(item.price)}`;

      const actionWrap = document.createElement("div");
      actionWrap.className = "product-card-actions";

      const addBtn = document.createElement("button");
      addBtn.type = "button";
      addBtn.className = "btn-primary";
      addBtn.dataset.action = "add";
      addBtn.dataset.id = String(item.id || "");
      addBtn.textContent = "В корзину";

      const qtyWrap = document.createElement("div");
      qtyWrap.className = "product-card-qty";
      qtyWrap.innerHTML = `
        <button type="button" class="card-qty-btn" data-action="minus" data-id="${String(item.id || "")}">-</button>
        <span class="card-qty-value">1</span>
        <button type="button" class="card-qty-btn" data-action="plus" data-id="${String(item.id || "")}">+</button>
      `;

      const qtyValue = qtyWrap.querySelector(".card-qty-value");
      const currentQty = window.PROdom?.getCartItemQuantity?.(item.id) || 0;

      if (currentQty > 0) {
        addBtn.style.display = "none";
        qtyWrap.style.display = "inline-flex";
        if (qtyValue) qtyValue.textContent = String(currentQty);
      } else {
        addBtn.style.display = "";
        qtyWrap.style.display = "none";
      }

      actionWrap.appendChild(addBtn);
      actionWrap.appendChild(qtyWrap);

      const removeBtn = document.createElement("button");
      removeBtn.type = "button";
      removeBtn.className = "cart-remove-btn";
      removeBtn.dataset.action = "remove";
      removeBtn.dataset.id = String(item.id || "");
      removeBtn.textContent = "Удалить";

      line.appendChild(unit);
      line.appendChild(actionWrap);
      line.appendChild(removeBtn);

      const info = document.createElement("div");
      info.className = "cart-item-info";
      info.appendChild(name);
      info.appendChild(line);

      row.appendChild(image);
      row.appendChild(info);
      fragment.appendChild(row);
    });

    listNode.appendChild(fragment);
  }
})();
</script>
</body>
</html>
